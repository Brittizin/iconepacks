name: Build Breakcore Icon Pack APK

on:
  workflow_dispatch:
  push:
    paths:
      - "android-app/**"
      - "tools/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/build-android-apk.yml"

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Node dependencies
        run: npm install

      - name: Generate icon assets
        run: |
          node ./tools/generate-breakcore-icons.js
          mkdir -p android-app/app/src/main/assets/icons
          cp breakcore-icon-pack/icons/*.png android-app/app/src/main/assets/icons/
          cp breakcore-icon-pack/manifest/icon-pack.json android-app/app/src/main/assets/icon-pack.json
          cp breakcore-icon-pack/preview/breakcore-wallpaper.png android-app/app/src/main/assets/breakcore-wallpaper.png

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: "8.10"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: ""

      - name: Install Android packages
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Create local.properties
        working-directory: android-app
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Build debug APK
        working-directory: android-app
        run: |
          gradle assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: breakcore-icon-pack-debug-apk
          path: android-app/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
